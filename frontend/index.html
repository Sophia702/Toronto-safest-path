<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Toronto Safest Path</title>
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""
    />
    <link rel="stylesheet" href="/styles.css" />
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <h2>Plan your route</h2>
            <form id="route-form">
                <div class="field">
                    <label for="start-input">Start address</label>
                    <input type="text" id="start-input" autocomplete="off" placeholder="Start address" />
                    <div class="suggestions" id="start-suggestions"></div>
                </div>
                <div class="field">
                    <label for="end-input">End address</label>
                    <input type="text" id="end-input" autocomplete="off" placeholder="End address" />
                    <div class="suggestions" id="end-suggestions"></div>
                </div>
                <div class="checkbox-row">
                    <input type="checkbox" id="avoid-dark" />
                    <label for="avoid-dark">Avoid dark streets</label>
                </div>
                <button type="submit" class="primary" id="submit-btn">Find route</button>
                <div class="form-error" id="form-error"></div>
            </form>
        </aside>

        <main class="main">
            <div class="app-hero">
                <h1>Toronto Safest Path</h1>
                <p>Find a walking route that balances distance against real crime and traffic exposure data.</p>
            </div>

            <div class="status-banner" id="status-banner"></div>

            <div class="results hidden" id="results">
                <div class="stat-row">
                    <div class="card" id="score-tile"></div>
                    <div class="card" id="distance-tile"></div>
                    <div class="card" id="walktime-tile"></div>
                </div>

                <div class="card">
                    <h4>Why this route</h4>
                    <div id="explanation-text"></div>
                </div>

                <div class="card">
                    <h4>Route exposure breakdown</h4>
                    <div id="breakdown-bars"></div>
                </div>
            </div>

            <div class="card">
                <h4>Route map</h4>
                <div id="map"></div>
            </div>
        </main>
    </div>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
    ></script>
    <script src="/app.js"></script>
</body>
</html>
